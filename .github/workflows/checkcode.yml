# Check for code style
name: checkcode

on:
  pull_request:
    branches:
      - 'main'
  push:
    branches:
      - 'main'

# TODO find a way to share these variables across the workflows
env:
  FOUR_C_DOCKER_DEPENDENCIES_HASH: 30e3f53d
  IMAGE_PATH: ghcr.io/4c-multiphysics/4c-dependencies

jobs:
  checkcode:
    runs-on: ubuntu-20.04
    env:
      SKIP: no-commit-to-branch
    steps:
      - uses: actions/checkout@v4
      - name: Run pre-commit
        run: |
          ./utilities/set_up_dev_env.sh
          source ./utilities/python-venv/bin/activate
          pre-commit clean
          pre-commit run --all-files --show-diff-on-failure

  clang-tidy:
    runs-on: ubuntu-latest
    container:
      image: $IMAGE_PATH:$FOUR_C_DOCKER_DEPENDENCIES_HASH
      options: --user root --env OMPI_ALLOW_RUN_AS_ROOT=1 --env OMPI_ALLOW_RUN_AS_ROOT_CONFIRM=1
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.github_token }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/compute-and-check-dependencies-hash
        with:
          docker_image_hash: $FOUR_C_DOCKER_DEPENDENCIES_HASH
      - uses: ./.github/actions/configure_4C
        with:
          cmake-preset: docker_codeclimate
          build-directory: ${{ github.workspace }}/../clang-tidy-build
      - name: Run Clang-tidy on codebase
        run: |
          cd $GITHUB_WORKSPACE/../clang-tidy-build
          mkdir -p clang-tidy-issues
          ESCAPED_PROJECT_DIR=$(echo "${GITHUB_WORKSPACE}" | sed 's/\//\\\//g')
          run-clang-tidy -j `nproc` -config-file ${GITHUB_WORKSPACE}/.clang-tidy -use-color -p . -export-fixes ./clang-tidy-issues/ -header-filter "${ESCAPED_PROJECT_DIR}\/.*" 2>&1 | python ${GITHUB_WORKSPACE}/utilities/code_climate/filter_clang_tidy_output.py

  verify-headers:
    runs-on: ubuntu-latest
    container:
      image: $IMAGE_PATH:$FOUR_C_DOCKER_DEPENDENCIES_HASH
      options: --user root --env OMPI_ALLOW_RUN_AS_ROOT=1 --env OMPI_ALLOW_RUN_AS_ROOT_CONFIRM=1
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.github_token }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/compute-and-check-dependencies-hash
        with:
          docker_image_hash: $FOUR_C_DOCKER_DEPENDENCIES_HASH
      - uses: ./.github/actions/configure_4C
        with:
          cmake-preset: docker
          build-directory: ${{ github.workspace }}/../verify-header-build
          additional-cmake-flags: "-DCMAKE_VERIFY_INTERFACE_HEADER_SETS=\"ON\""
      - uses: ./.github/actions/build_4C
        with:
          build-targets: all_verify_interface_header_sets
          build-directory: ${{ github.workspace }}/../verify-header-build

